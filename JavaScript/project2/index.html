<html lang="en">
<head>

    <title>Temprature convertor</title>
</head>
<body>
    <h1>Temprature convertor</h1>
    <input type="text" id="temp" placeholder="Enter Temprature">
    <select id="unit">

        <option value="F">Farenhite</option>

    <button id="convert">Convert</button>
    <p>Concerted temprature : <span id="converted">0</span></p>
</body>

    <link rel="stylesheet" href="style.css">
